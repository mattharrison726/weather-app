# Alembic configuration file.
# This file is used by alembic CLI commands.
# Run from the backend/ directory: alembic upgrade head

[alembic]
# Path to migration scripts, relative to this file
script_location = app/db/migrations

# Template for naming migration files: timestamp + description
file_template = %%(rev)s_%%(slug)s

# SQLAlchemy connection URL.
# NOTE: Alembic reads this but we override it in env.py to use our Settings class,
# so the URL here is just a fallback placeholder.
sqlalchemy.url = sqlite:///./data/weather.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
